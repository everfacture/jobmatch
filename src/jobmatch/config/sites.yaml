# Direct career site registry for JobMatch
# Users can add their own sites following this pattern.
# Use {location_encoded} placeholder for location (URL-encoded).
# Use {query_encoded} placeholder for search terms (URL-encoded).

# ── Manual-Only ATS Domains ──────────────────────────────────────
# These ATS platforms have unsolvable CAPTCHAs. Jobs routing through them
# are flagged as "manual" during apply — bot skips, user applies by hand.
manual_ats:
  - "ibegin.tcsapps.com"       # TCS iBegin — unsolvable CAPTCHA every time

# ── Blocked sites — too problematic for automation ───────────────────────
blocked:
  sites:
    - "glassdoor"
    - "google"
    - "accenture"
    - "AccentureCareers"
    - "Workopolis"
    - "Dubai Careers"        # broken TLS — net::ERR_SSL_UNRECOGNIZED_NAME_ALERT
  url_patterns:
    - "%glassdoor%"
    - "%google.com/about/careers%"
    - "%google.jobs%"
    - "%accenture%"
    - "%workopolis.com/out%"
    - "%dubaicareers%"       # block all dubaicareers.ae URLs (broken TLS)

# ── Blocked SSO domains — cannot authenticate through these ──────────────
blocked_sso:
  - "accounts.google.com"
  - "login.microsoftonline.com"
  - "okta.com"
  - "auth0.com"
  - "sso.cisco.com"

# ── Base URLs for URL resolution ─────────────────────────────────────────
# Used by detail enrichment to resolve relative URLs scraped from sites.
base_urls:
  "RemoteOK": "https://remoteok.com"
  "WeWorkRemotely": "https://weworkremotely.com"
  "Hacker News Jobs": "https://news.ycombinator.com/"

sites:
  # ── Gulf/UAE ──────────────────────────────────────────────────────
  - name: "Bayt"
    url: "https://www.bayt.com/en/uae/jobs/{query_encoded}-jobs/"
    type: search  # custom Apify extractor registered in smartextract.py

  - name: "GulfTalent"
    url: "https://www.gulftalent.com/jobs?search={query_encoded}&location=UAE"
    type: search  # custom Apify extractor registered in smartextract.py

  - name: "Naukri Gulf"
    url: "https://www.naukrigulf.com/{query_encoded}-jobs-in-uae"
    type: search  # custom Apify extractor registered in smartextract.py

  - name: "GulfJobs"
    url: "https://www.gulfjobs.com/"
    type: search

  - name: "Dubai Careers"
    url: "https://www.dubaicareers.ae/search?q={query_encoded}"
    type: search

  - name: "Laimoon"
    url: "https://laimoon.com/jobs?q={query_encoded}&country=AE"
